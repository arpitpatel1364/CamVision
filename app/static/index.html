<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamVision Advance | Enterprise VMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔒 Login Screen -->
    <div id="loginScreen" class="modal-overlay" style="display:flex">
        <div class="modal animate-in">
            <div style="text-align:center; margin-bottom:32px">
                <img src="images/logo.png" style="width:64px; height:64px; margin-bottom:16px">
                <h2 style="font-family:'Outfit'; font-size:24px">Welcome Back</h2>
                <p style="color:var(--text-dim); font-size:13px; margin-top:8px">Access your intelligent VMS</p>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUser" value="admin" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" value="admin" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" style="width:100%; height:48px; font-size:15px" onclick="login()">SIGN IN</button>
            <p id="loginError" style="color:var(--error); font-size:12px; margin-top:16px; text-align:center"></p>
        </div>
    </div>

    <!-- 🛡️ Main App Container (Hidden by default) -->
    <div id="appContainer" style="display:none">
        <header>
            <a href="#" class="brand">
                <img src="images/logo.png" alt="CamVision Logo">
                <h1>CamVision Advance</h1>
            </a>
            <div style="margin-left:auto; display:flex; gap:16px; align-items:center">
                <button class="btn btn-secondary" onclick="switchView('grid')">GRID VIEW</button>
                <button class="btn btn-secondary" onclick="switchView('player')">PLAYER</button>
                <div style="width:1px; height:24px; background:var(--border)"></div>
                <div id="userProfile" style="display:flex; align-items:center; gap:10px; cursor:pointer" onclick="showProfile()">
                    <div id="headerInitials" style="width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700">A</div>
                    <span id="usernameDisplay" style="font-weight:600; font-size:13px">Admin</span>
                </div>
                <button class="btn btn-secondary" style="width:40px; padding:0; justify-content:center; color:var(--error)" onclick="logout()" title="Logout">↩</button>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">Active Devices</div>
                <div class="cam-list" id="camList"></div>
                <div style="padding:16px; border-top:1px solid var(--border)">
                    <button class="btn btn-primary" style="width:100%" onclick="showModal('addCamModal')">＋ ADD NEW DEVICE</button>
                </div>
            </aside>

            <!-- Main Content -->
            <section class="content">
                <!-- Player View -->
                <div id="playerView" style="flex:1; display:flex; flex-direction:column">
                    <div class="video-container">
                        <video id="mainVideo" autoplay muted playsinline></video>
                        <div id="videoOverlay" class="video-overlay" style="display:none">
                            <div class="loader"></div>
                        </div>
                        <canvas id="detectionCanvas" style="position:absolute; inset:0; pointer-events:none"></canvas>
                    </div>

                    <div class="controls-bar">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                            <span style="font-weight:700; font-size:12px; letter-spacing:1px">ARCHIVE TIMELINE</span>
                            <div style="display:flex; gap:8px; align-items:center">
                                <input type="datetime-local" id="dtPicker" class="glass" style="height:32px; border-radius:4px; padding:0 8px; border:1px solid var(--border); color:#fff">
                                <button class="btn btn-primary" style="height:32px; font-size:11px" onclick="fetchArchive()">SEEK</button>
                            </div>
                        </div>
                        <div class="timeline-track" id="timelineTrack" onclick="seekTimeline(event)">
                            <div class="timeline-cursor" id="timelineCursor"></div>
                            <div id="timelineSegments"></div>
                        </div>
                        <div style="display:flex; justify-content:center; gap:16px">
                            <button class="btn btn-secondary" onclick="step(-10)">-10s</button>
                            <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">PAUSE</button>
                            <button class="btn btn-secondary" onclick="step(10)">+10s</button>
                            <button class="btn btn-secondary" onclick="toggleLive()">LIVE</button>
                        </div>
                    </div>
                </div>

                <!-- Grid View -->
                <div id="gridView" style="display:none; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap:12px; padding:12px; background:var(--bg); height:100%; overflow-y:auto"></div>
            </section>

            <!-- Event Feed -->
            <aside class="event-feed">
                <div class="sidebar-header">Intelligence Events</div>
                <div class="feed-list" id="eventFeed"></div>
            </aside>
        </div>
    </div>

    <!-- 👤 User Profile Modal -->
    <div id="profileModal" class="modal-overlay" style="display:none">
        <div class="modal animate-in" style="width:500px">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px">
                <h2 style="font-family:'Outfit'">User Profile</h2>
                <button class="btn btn-secondary" style="width:32px; height:32px; padding:0" onclick="hideModal('profileModal')">✕</button>
            </div>

            <div class="tab-container">
                <div class="tab active" id="tabGeneral" onclick="switchProfileTab('general')">General</div>
                <div class="tab" id="tabSecurity" onclick="switchProfileTab('security')">Security</div>
            </div>

            <div id="profileView">
                <div class="profile-card">
                    <div class="profile-avatar-large" id="profileInitials">A</div>
                    <div style="text-align:center">
                        <h3 id="displayFullName" style="font-size:18px">Admin User</h3>
                        <p id="displayUsername" style="color:var(--text-dim); font-size:13px">@admin</p>
                    </div>
                </div>

                <div id="generalSettings">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="editFullName" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="editEmail" placeholder="john@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="editBio" style="width:100%; height:80px; background:#111; border:1px solid var(--border); border-radius:6px; color:#fff; padding:12px; outline:none; font-family:var(--font-main); resize:none" placeholder="Tell us about yourself..."></textarea>
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="updateProfile()">SAVE CHANGES</button>
                </div>

                <div id="securitySettings" style="display:none">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="oldPass" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPass" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPass" placeholder="••••••••">
                    </div>
                    <button class="btn btn-primary" style="width:100%" onclick="changePassword()">UPDATE PASSWORD</button>
                </div>
            </div>

            <p id="profileMessage" style="font-size:12px; margin-top:16px; text-align:center"></p>
        </div>
    </div>

    <!-- ➕ Add Camera Modal -->
    <div id="addCamModal" class="modal-overlay" style="display:none">
        <div class="modal animate-in" style="width:480px">
            <h2 style="margin-bottom:24px; font-family:'Outfit'">Discovery & Onboarding</h2>
            
            <div id="addForm">
                <div class="form-group">
                    <label>Device Name (Alias)</label>
                    <input type="text" id="camName" placeholder="Main Lobby NVR">
                </div>
                <div class="form-group">
                    <label>IP Address / Host</label>
                    <input type="text" id="camHost" placeholder="192.168.1.10">
                </div>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
                    <div class="form-group">
                        <label>ONVIF Port</label>
                        <input type="number" id="camPort" value="80">
                    </div>
                    <div class="form-group">
                        <label>RTSP Port</label>
                        <input type="number" id="camRtsp" value="554">
                    </div>
                </div>

                <div class="form-group">
                    <label>ONVIF Username</label>
                    <input type="text" id="camUser" value="admin">
                </div>
                <div class="form-group">
                    <label>ONVIF Password</label>
                    <input type="password" id="camPass" placeholder="Required for discovery">
                </div>
                
                <div style="display:flex; gap:12px; margin-top:24px">
                    <button class="btn btn-secondary" style="flex:1" onclick="hideModal('addCamModal')">CANCEL</button>
                    <button class="btn btn-primary" id="addSubmitBtn" style="flex:1" onclick="addCamera()">PROBE & ADD</button>
                </div>
            </div>

            <div id="addLoader" style="display:none; text-align:center; padding:40px 0">
                <div class="loader" style="margin:0 auto 20px"></div>
                <p style="font-weight:600">Probing ONVIF Services...</p>
                <p style="color:var(--text-dim); font-size:12px; margin-top:8px">Analyzing device capabilities and streams</p>
            </div>
            
            <p id="addError" style="color:var(--error); font-size:12px; margin-top:16px; text-align:center"></p>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('cv_token');
        let currentUser = null;
        let activeCamId = null;
        let cameras = [];
        let isLive = true;
        let detectionInterval = null;

        const API = '';

        // ── Auth Logic ──────────────────────────────────────────────────

        async function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const err = document.getElementById('loginError');

            try {
                const formData = new FormData();
                formData.append('username', user);
                formData.append('password', pass);

                const res = await fetch(`${API}/login`, { method: 'POST', body: formData });
                const data = await res.json();

                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('cv_token', token);
                    showDashboard();
                } else {
                    err.textContent = data.detail || 'Invalid username or password';
                }
            } catch (e) { err.textContent = 'Server connection failed'; }
        }

        function logout() {
            localStorage.removeItem('cv_token');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            initApp();
        }

        // ── Initialization ──────────────────────────────────────────────

        async function initApp() {
            if (!token) return;
            await loadUserProfile();
            loadCameras();
            pollEvents();
        }

        async function loadUserProfile() {
            try {
                const res = await fetch(`${API}/api/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    currentUser = await res.json();
                    updateUserUI();
                } else if (res.status === 401) {
                    logout();
                }
            } catch (e) { console.error('Profile load fail:', e); }
        }

        function updateUserUI() {
            if (!currentUser) return;
            const initials = (currentUser.full_name || currentUser.username).charAt(0).toUpperCase();
            document.getElementById('usernameDisplay').textContent = currentUser.full_name || currentUser.username;
            document.getElementById('headerInitials').textContent = initials;
            
            // Modal updates
            document.getElementById('profileInitials').textContent = initials;
            document.getElementById('displayFullName').textContent = currentUser.full_name || 'Set your name';
            document.getElementById('displayUsername').textContent = `@${currentUser.username}`;
            document.getElementById('editFullName').value = currentUser.full_name || '';
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editBio').value = currentUser.bio || '';
        }

        function showProfile() {
            showModal('profileModal');
            switchProfileTab('general');
            document.getElementById('profileMessage').textContent = '';
        }

        function switchProfileTab(tab) {
            const gen = document.getElementById('generalSettings');
            const sec = document.getElementById('securitySettings');
            const tabG = document.getElementById('tabGeneral');
            const tabS = document.getElementById('tabSecurity');
            
            if (tab === 'general') {
                gen.style.display = 'block'; sec.style.display = 'none';
                tabG.classList.add('active'); tabS.classList.remove('active');
            } else {
                gen.style.display = 'none'; sec.style.display = 'block';
                tabG.classList.remove('active'); tabS.classList.add('active');
            }
        }

        async function updateProfile() {
            const msg = document.getElementById('profileMessage');
            const body = {
                full_name: document.getElementById('editFullName').value,
                email: document.getElementById('editEmail').value,
                bio: document.getElementById('editBio').value
            };

            try {
                const res = await fetch(`${API}/api/me`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    msg.style.color = 'var(--success)';
                    msg.textContent = 'Profile updated successfully!';
                    await loadUserProfile();
                } else {
                    const data = await res.json();
                    msg.style.color = 'var(--error)';
                    msg.textContent = data.detail || 'Update failed';
                }
            } catch (e) { msg.textContent = 'Connection error'; }
        }

        async function changePassword() {
            const msg = document.getElementById('profileMessage');
            const oldPass = document.getElementById('oldPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if (newPass !== confirmPass) {
                msg.style.color = 'var(--error)';
                return msg.textContent = 'Passwords do not match';
            }

            try {
                const res = await fetch(`${API}/api/me/password`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ old_password: oldPass, new_password: newPass })
                });

                if (res.ok) {
                    msg.style.color = 'var(--success)';
                    msg.textContent = 'Password updated successfully!';
                    document.getElementById('oldPass').value = '';
                    document.getElementById('newPass').value = '';
                    document.getElementById('confirmPass').value = '';
                } else {
                    const data = await res.json();
                    msg.style.color = 'var(--error)';
                    msg.textContent = data.detail || 'Update failed';
                }
            } catch (e) { msg.textContent = 'Connection error'; }
        }

        // Initial State Check
        if (token) {
            showDashboard();
        }

        async function loadCameras() {
            try {
                const res = await fetch(`${API}/cameras`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) return logout();
                
                cameras = await res.json();
                renderSidebar();
                if (document.getElementById('gridView').style.display === 'grid') renderGrid();
                if (cameras.length > 0 && !activeCamId) selectCam(cameras[0].id);
            } catch (e) { console.error('Load fail:', e); }
        }

        function renderSidebar() {
            const list = document.getElementById('camList');
            list.innerHTML = cameras.map(c => `
                <div class="cam-item ${activeCamId === c.id ? 'active' : ''}" onclick="selectCam('${c.id}')">
                    <div class="cam-icon">${c.device_type === 'NVR' ? '💾' : '📷'}</div>
                    <div class="cam-info">
                        <div class="cam-name">${c.name}</div>
                        <div class="cam-status">
                            <div class="dot online"></div>
                            <span>${c.brand.toUpperCase()} · ${c.primary_res || '1080p'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ── Camera Actions ──────────────────────────────────────────────

        async function selectCam(id) {
            activeCamId = id;
            renderSidebar();
            toggleLive();
        }

        function toggleLive() {
            isLive = true;
            const vid = document.getElementById('mainVideo');
            const ov = document.getElementById('videoOverlay');
            ov.style.display = 'flex';
            
            vid.src = `${API}/cameras/${activeCamId}/live-stream`;
            vid.onplaying = () => { ov.style.display = 'none'; startDetection(); };
            document.getElementById('playBtn').textContent = 'PAUSE';
        }

        async function fetchArchive() {
            const dt = document.getElementById('dtPicker').value;
            if (!dt) return alert('Select a start time');
            isLive = false;
            stopDetection();
            const vid = document.getElementById('mainVideo');
            const ov = document.getElementById('videoOverlay');
            ov.style.display = 'flex';
            
            const url = `${API}/cameras/${activeCamId}/chunk?start=${encodeURIComponent(dt)}&duration=30`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const blob = await res.blob();
                vid.src = URL.createObjectURL(blob);
                vid.onplaying = () => { ov.style.display = 'none'; };
                document.getElementById('playBtn').textContent = 'PLAY';
            } else {
                alert('Recording not found');
                ov.style.display = 'none';
            }
        }

        async function addCamera() {
            const form = document.getElementById('addForm');
            const loader = document.getElementById('addLoader');
            const err = document.getElementById('addError');
            
            const body = {
                name: document.getElementById('camName').value,
                host: document.getElementById('camHost').value,
                port: parseInt(document.getElementById('camPort').value),
                rtsp_port: parseInt(document.getElementById('camRtsp').value),
                username: document.getElementById('camUser').value,
                password: document.getElementById('camPass').value
            };

            if (!body.name || !body.host) return err.textContent = 'Name and Host are required';

            form.style.display = 'none';
            loader.style.display = 'block';
            err.textContent = '';

            try {
                const res = await fetch(`${API}/cameras`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    hideModal('addCamModal');
                    loadCameras();
                } else {
                    const data = await res.json();
                    throw new Error(data.detail || 'Probe failed');
                }
            } catch (e) {
                err.textContent = e.message;
                form.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        // ── UI Control ──────────────────────────────────────────────────

        function showModal(id) { 
            const m = document.getElementById(id);
            m.style.display = 'flex'; 
            if (id === 'addCamModal') {
                document.getElementById('addForm').style.display = 'block';
                document.getElementById('addLoader').style.display = 'none';
                document.getElementById('addError').textContent = '';
            }
        }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchView(view) {
            const p = document.getElementById('playerView');
            const g = document.getElementById('gridView');
            if (view === 'grid') {
                p.style.display = 'none'; g.style.display = 'grid';
                renderGrid();
            } else {
                p.style.display = 'flex'; g.style.display = 'none';
            }
        }

        function renderGrid() {
            const g = document.getElementById('gridView');
            if (cameras.length === 0) {
                g.innerHTML = `
                    <div style="grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-dim)">
                        <span style="font-size:48px; margin-bottom:16px">📷</span>
                        <p>No cameras added yet</p>
                    </div>
                `;
                return;
            }
            g.innerHTML = cameras.map(c => `
                <div class="grid-item" onclick="selectCamFromGrid('${c.id}')" style="position:relative; aspect-ratio:16/9; background:#000; border-radius:8px; overflow:hidden; border:1px solid var(--border); transition:all 0.3s; cursor:pointer">
                    <video autoplay muted playsinline src="${API}/cameras/${c.id}/live-stream?low_res=true" style="width:100%; height:100%; object-fit:cover"></video>
                    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%); pointer-events:none"></div>
                    <div style="position:absolute; bottom:12px; left:12px; display:flex; align-items:center; gap:8px">
                        <div class="dot online" style="width:8px; height:8px"></div>
                        <span style="font-size:12px; font-weight:700; text-shadow:0 1px 4px rgba(0,0,0,0.5)">${c.name}</span>
                    </div>
                    <div style="position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; font-size:10px; font-weight:800; border:1px solid rgba(255,255,255,0.1)">${c.brand.toUpperCase()}</div>
                </div>
            `).join('');
        }

        function selectCamFromGrid(id) {
            selectCam(id);
            switchView('player');
        }

        // ── Intelligence Logic ──────────────────────────────────────────

        function startDetection() {
            if (detectionInterval) clearInterval(detectionInterval);
            detectionInterval = setInterval(async () => {
                if (!isLive || !activeCamId) return;
                try {
                    const res = await fetch(`${API}/cameras/${activeCamId}/detect`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    drawDetections(data.detections);
                } catch (e) {}
            }, 2000);
        }

        function stopDetection() {
            if (detectionInterval) clearInterval(detectionInterval);
            const canvas = document.getElementById('detectionCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawDetections(detections) {
            const canvas = document.getElementById('detectionCanvas');
            const vid = document.getElementById('mainVideo');
            canvas.width = vid.clientWidth;
            canvas.height = vid.clientHeight;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!detections) return;

            detections.forEach(det => {
                const [x, y, w, h] = det.box;
                const scaleX = canvas.width / 1280; 
                const scaleY = canvas.height / 720;
                
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 3;
                ctx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
                
                ctx.fillStyle = '#3b82f6';
                ctx.font = 'bold 12px Inter';
                ctx.fillText(`${det.label.toUpperCase()} ${Math.round(det.confidence*100)}%`, x * scaleX, y * scaleY - 5);
            });
        }

        async function pollEvents() {
            const feed = document.getElementById('eventFeed');
            setInterval(async () => {
                if (!activeCamId) return;
                try {
                    const res = await fetch(`${API}/cameras/${activeCamId}/detect`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.detections && data.detections.length > 0) {
                        data.detections.forEach(det => {
                            if (det.confidence > 0.8) {
                                const card = document.createElement('div');
                                card.className = 'event-card animate-in';
                                card.innerHTML = `
                                    <div class="event-thumb">
                                        <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:rgba(59,130,246,0.1); color:#3b82f6; font-size:10px; font-weight:800">CAPTURE</div>
                                    </div>
                                    <div class="event-type">${det.label} DETECTED</div>
                                    <div class="event-time">${new Date().toLocaleTimeString()}</div>
                                `;
                                feed.prepend(card);
                                if (feed.children.length > 20) feed.lastChild.remove();
                            }
                        });
                    }
                } catch (e) {}
            }, 5000);
        }
    </script>
</body>
</html>
