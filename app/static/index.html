<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamVision Advance | Enterprise VMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔒 Login Screen -->
    <div id="loginScreen" class="modal-overlay" style="display:flex">
        <div class="modal animate-in">
            <div style="text-align:center; margin-bottom:32px">
                <img src="images/logo.png" style="width:64px; height:64px; margin-bottom:16px">
                <h2 style="font-family:'Outfit'; font-size:24px">Welcome Back</h2>
                <p style="color:var(--text-dim); font-size:13px; margin-top:8px">Access your intelligent VMS</p>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUser" value="admin" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" value="admin" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" style="width:100%; height:48px; font-size:15px" onclick="login()">SIGN IN</button>
            <p id="loginError" style="color:var(--error); font-size:12px; margin-top:16px; text-align:center"></p>
        </div>
    </div>

    <!-- 🛡️ Main App Container (Hidden by default) -->
    <div id="appContainer" style="display:none">
        <header>
            <a href="#" class="brand">
                <img src="images/logo.png" alt="CamVision Logo">
                <h1>CamVision Advance</h1>
            </a>
            <div style="margin-left:auto; display:flex; gap:16px; align-items:center">
                <button class="btn btn-secondary" onclick="switchView('grid')">GRID VIEW</button>
                <button class="btn btn-secondary" onclick="switchView('player')">PLAYER</button>
                <div style="width:1px; height:24px; background:var(--border)"></div>
                <div id="userProfile" style="display:flex; align-items:center; gap:10px">
                    <div style="width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700">A</div>
                    <span id="usernameDisplay" style="font-weight:600; font-size:13px">Admin</span>
                </div>
                <button class="btn btn-secondary" style="width:40px; padding:0; justify-content:center; color:var(--error)" onclick="logout()" title="Logout">↩</button>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">Active Devices</div>
                <div class="cam-list" id="camList"></div>
                <div style="padding:16px; border-top:1px solid var(--border)">
                    <button class="btn btn-primary" style="width:100%" onclick="showModal('addCamModal')">＋ ADD NEW DEVICE</button>
                </div>
            </aside>

            <!-- Main Content -->
            <section class="content">
                <!-- Player View -->
                <div id="playerView" style="flex:1; display:flex; flex-direction:column">
                    <div class="video-container">
                        <video id="mainVideo" autoplay muted playsinline></video>
                        <div id="videoOverlay" class="video-overlay" style="display:none">
                            <div class="loader"></div>
                        </div>
                        <canvas id="detectionCanvas" style="position:absolute; inset:0; pointer-events:none"></canvas>
                    </div>

                    <div class="controls-bar">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                            <span style="font-weight:700; font-size:12px; letter-spacing:1px">ARCHIVE TIMELINE</span>
                            <div style="display:flex; gap:8px; align-items:center">
                                <input type="datetime-local" id="dtPicker" class="glass" style="height:32px; border-radius:4px; padding:0 8px; border:1px solid var(--border); color:#fff">
                                <button class="btn btn-primary" style="height:32px; font-size:11px" onclick="fetchArchive()">SEEK</button>
                            </div>
                        </div>
                        <div class="timeline-track" id="timelineTrack" onclick="seekTimeline(event)">
                            <div class="timeline-cursor" id="timelineCursor"></div>
                            <div id="timelineSegments"></div>
                        </div>
                        <div style="display:flex; justify-content:center; gap:16px">
                            <button class="btn btn-secondary" onclick="step(-10)">-10s</button>
                            <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">PAUSE</button>
                            <button class="btn btn-secondary" onclick="step(10)">+10s</button>
                            <button class="btn btn-secondary" onclick="toggleLive()">LIVE</button>
                        </div>
                    </div>
                </div>

                <!-- Grid View -->
                <div id="gridView" style="display:none; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap:1px; background:var(--border); height:100%; overflow-y:auto"></div>
            </section>

            <!-- Event Feed -->
            <aside class="event-feed">
                <div class="sidebar-header">Intelligence Events</div>
                <div class="feed-list" id="eventFeed"></div>
            </aside>
        </div>
    </div>

    <!-- ➕ Add Camera Modal -->
    <div id="addCamModal" class="modal-overlay" style="display:none">
        <div class="modal">
            <h2 style="margin-bottom:24px; font-family:'Outfit'">Add ONVIF Device</h2>
            <div class="form-group"><label>Device Name</label><input type="text" id="camName" placeholder="Entry Gate"></div>
            <div class="form-group"><label>Host / IP</label><input type="text" id="camHost" placeholder="192.168.1.10"></div>
            <div class="form-group"><label>Username</label><input type="text" id="camUser" value="admin"></div>
            <div class="form-group"><label>Password</label><input type="password" id="camPass"></div>
            <div style="display:flex; gap:12px">
                <button class="btn btn-secondary" style="flex:1" onclick="hideModal('addCamModal')">CANCEL</button>
                <button class="btn btn-primary" style="flex:1" onclick="addCamera()">ADD</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('cv_token');
        let activeCamId = null;
        let cameras = [];
        let isLive = true;
        let detectionInterval = null;

        const API = '';

        // ── Auth Logic ──────────────────────────────────────────────────

        async function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const err = document.getElementById('loginError');

            try {
                const formData = new FormData();
                formData.append('username', user);
                formData.append('password', pass);

                const res = await fetch(`${API}/login`, { method: 'POST', body: formData });
                const data = await res.json();

                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('cv_token', token);
                    showDashboard();
                } else {
                    err.textContent = data.detail || 'Invalid username or password';
                }
            } catch (e) { err.textContent = 'Server connection failed'; }
        }

        function logout() {
            localStorage.removeItem('cv_token');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            initApp();
        }

        // ── Initialization ──────────────────────────────────────────────

        function initApp() {
            if (!token) return;
            loadCameras();
            pollEvents();
        }

        // Initial State Check
        if (token) {
            showDashboard();
        }

        async function loadCameras() {
            try {
                const res = await fetch(`${API}/cameras`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) return logout();
                
                cameras = await res.json();
                renderSidebar();
                if (cameras.length > 0 && !activeCamId) selectCam(cameras[0].id);
            } catch (e) { console.error('Load fail:', e); }
        }

        function renderSidebar() {
            const list = document.getElementById('camList');
            list.innerHTML = cameras.map(c => `
                <div class="cam-item ${activeCamId === c.id ? 'active' : ''}" onclick="selectCam('${c.id}')">
                    <div class="cam-icon">${c.device_type === 'NVR' ? '💾' : '📷'}</div>
                    <div class="cam-info">
                        <div class="cam-name">${c.name}</div>
                        <div class="cam-status">
                            <div class="dot online"></div>
                            <span>${c.brand.toUpperCase()} · ${c.primary_res || '1080p'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ── Camera Actions ──────────────────────────────────────────────

        async function selectCam(id) {
            activeCamId = id;
            renderSidebar();
            toggleLive();
        }

        function toggleLive() {
            isLive = true;
            const vid = document.getElementById('mainVideo');
            const ov = document.getElementById('videoOverlay');
            ov.style.display = 'flex';
            
            // In production, use session cookies or token in header for streams
            vid.src = `${API}/cameras/${activeCamId}/live-stream`;
            vid.onplaying = () => { ov.style.display = 'none'; startDetection(); };
            document.getElementById('playBtn').textContent = 'PAUSE';
        }

        async function fetchArchive() {
            const dt = document.getElementById('dtPicker').value;
            if (!dt) return alert('Select a start time');
            isLive = false;
            stopDetection();
            const vid = document.getElementById('mainVideo');
            const ov = document.getElementById('videoOverlay');
            ov.style.display = 'flex';
            
            const url = `${API}/cameras/${activeCamId}/chunk?start=${encodeURIComponent(dt)}&duration=30`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const blob = await res.blob();
                vid.src = URL.createObjectURL(blob);
                vid.onplaying = () => { ov.style.display = 'none'; };
                document.getElementById('playBtn').textContent = 'PLAY';
            } else {
                alert('Recording not found');
                ov.style.display = 'none';
            }
        }

        async function addCamera() {
            const body = {
                name: document.getElementById('camName').value,
                host: document.getElementById('camHost').value,
                username: document.getElementById('camUser').value,
                password: document.getElementById('camPass').value
            };

            const res = await fetch(`${API}/cameras`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                hideModal('addCamModal');
                loadCameras();
            } else {
                alert('Add failed - check credentials or ONVIF port');
            }
        }

        // ── UI Control ──────────────────────────────────────────────────

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchView(view) {
            const p = document.getElementById('playerView');
            const g = document.getElementById('gridView');
            if (view === 'grid') {
                p.style.display = 'none'; g.style.display = 'grid';
                renderGrid();
            } else {
                p.style.display = 'flex'; g.style.display = 'none';
            }
        }

        function renderGrid() {
            const g = document.getElementById('gridView');
            g.innerHTML = cameras.map(c => `
                <div style="position:relative; aspect-ratio:16/9; background:#000">
                    <video autoplay muted playsinline src="${API}/cameras/${c.id}/live-stream" style="width:100%; height:100%; object-fit:cover"></video>
                    <div style="position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.7); padding:4px 10px; border-radius:4px; font-size:11px; font-weight:700">${c.name}</div>
                </div>
            `).join('');
        }

        // ── Intelligence Logic ──────────────────────────────────────────

        function startDetection() {
            if (detectionInterval) clearInterval(detectionInterval);
            detectionInterval = setInterval(async () => {
                if (!isLive || !activeCamId) return;
                try {
                    const res = await fetch(`${API}/cameras/${activeCamId}/detect`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    drawDetections(data.detections);
                } catch (e) {}
            }, 2000);
        }

        function stopDetection() {
            if (detectionInterval) clearInterval(detectionInterval);
            const canvas = document.getElementById('detectionCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawDetections(detections) {
            const canvas = document.getElementById('detectionCanvas');
            const vid = document.getElementById('mainVideo');
            canvas.width = vid.clientWidth;
            canvas.height = vid.clientHeight;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            detections.forEach(det => {
                const [x, y, w, h] = det.box;
                const scaleX = canvas.width / 1280; // Assuming 720p normalized coordinates
                const scaleY = canvas.height / 720;
                
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 3;
                ctx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
                
                ctx.fillStyle = '#3b82f6';
                ctx.font = 'bold 12px Inter';
                ctx.fillText(`${det.label.toUpperCase()} ${Math.round(det.confidence*100)}%`, x * scaleX, y * scaleY - 5);
            });
        }

        async function pollEvents() {
            const feed = document.getElementById('eventFeed');
            setInterval(async () => {
                if (!activeCamId) return;
                try {
                    const res = await fetch(`${API}/cameras/${activeCamId}/detect`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.detections && data.detections.length > 0) {
                        data.detections.forEach(det => {
                            if (det.confidence > 0.8) {
                                const card = document.createElement('div');
                                card.className = 'event-card animate-in';
                                card.innerHTML = `
                                    <div class="event-thumb">
                                        <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:rgba(59,130,246,0.1); color:#3b82f6; font-size:10px; font-weight:800">CAPTURE</div>
                                    </div>
                                    <div class="event-type">${det.label} DETECTED</div>
                                    <div class="event-time">${new Date().toLocaleTimeString()}</div>
                                `;
                                feed.prepend(card);
                                if (feed.children.length > 20) feed.lastChild.remove();
                            }
                        });
                    }
                } catch (e) {}
            }, 5000);
        }
    </script>
</body>
</html>
